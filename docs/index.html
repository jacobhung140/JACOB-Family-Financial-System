<body style="margin:0; display:flex; height:100vh; font-family:Arial, sans-serif;">

    <!-- Sidebar -->
    <div style="width:220px; background:#2c3e50; color:white; padding:20px;">
        <h2 style="margin-top:0;">Jacob 家族</h2>
        <ul style="list-style:none; padding:0;">
            <li style="margin:10px 0;">🏠 儀表板首頁</li>
            <li style="margin:10px 0;">📊 年度雷達圖</li>
            <li style="margin:10px 0;">📁 資料管理</li>
            <li style="margin:10px 0;">⚙️ 系統設定</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div style="flex:1; padding:30px;">
        <h1> Jacob Family Dashboard </h1>
        <p>這裡是主內容區，我們接下來會一步一步加入圖表與資料。</p>
        <button id="generateReportBtn" style="padding:10px 20px; font-size:16px; cursor:pointer;">
  🤖 AI 自動生成年度報告
</button>

    <canvas id="radarChart" width="400" height="400"></canvas>
        <div id="annualReport" style="margin-top: 30px;"></div>

    </div>
    
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('radarChart');

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: [
            '緊急預備金','流動性','匯率風險','長期投資','不動產',
            '負債風險','保險覆蓋','家庭責任','生活支出穩定度','收入穩定度',
            '職涯穩定度','健康風險','長照風險','稅務風險','法律風險',
            '事業風險','投資集中風險','家庭治理','財務紀律'
        ],
        datasets: [{
            label: '2026 家庭風險與財務穩定度',
            data: [3,3,2,2,3,3,2,2,3,2,2,2,3,2,3,1,1,3,2],
            borderColor: 'rgba(75, 192, 192, 1)',
            backgroundColor: 'rgba(75, 192, 192, 0.2)',
            borderWidth: 2,
            pointRadius: 3
        }]
    },
    options: {
        scales: {
            r: {
                grid: {
    color: '#666'
},
angleLines: {
    color: '#666'
},
ticks: {
    color: '#666',stepSize: 1

},

                suggestedMin: 0,
                suggestedMax: 3,
                
            }
        }
    }
});
</script>
<script>document.getElementById('generateReportBtn').addEventListener('click', async function () {

  // 1. 讀取 JSON
  const response = await fetch('data/2026/雷達圖資料.json');
  const data = await response.json();

  // 2. 找最高分與最低分
  const highest = Object.entries(data)
    .sort((a, b) => b[1] - a[1])[0];

  const lowest = Object.entries(data)
    .sort((a, b) => a[1] - b[1])[0];

  // 3. 自動生成摘要
  const summary = `
    2026 年度整體風險狀況穩定，其中表現最佳的是「${highest[0]}」，分數為 ${highest[1]}。
    需要優先改善的項目為「${lowest[0]}」，分數為 ${lowest[1]}。
  `;

  // 4. 自動生成建議
  const suggestion = `
    建議針對「${lowest[0]}」制定改善計畫，並持續維持「${highest[0]}」的良好表現。
  `;

  // 5. 插入年度報告卡片
  document.getElementById('annualReport').innerHTML = `
    <div style="
      padding:20px;
      border:1px solid #ccc;
      border-radius:10px;
      background:#fafafa;
      line-height:1.8;
    ">
      <h2>📘 2026 年度家庭財務報告</h2>
      <h3>📌 摘要</h3>
      <p>${summary}</p>

      <h3>⚠️ 風險重點</h3>
      <p>最高分：${highest[0]}（${highest[1]}）<br>
         最低分：${lowest[0]}（${lowest[1]}）</p>

      <h3>💡 建議</h3>
      <p>${suggestion}</p>

      <h3>📊 數據來源</h3>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    </div>
  `;
});

</script>


</body>
